    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm AI: Vui nhộn & Sáng tạo</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f7fff7;
            --text: #2c3e50;
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --wrong-bg: #f8d7da;
            --wrong-border: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--accent) 10%, transparent 10%), radial-gradient(var(--accent) 10%, transparent 10%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 4px solid var(--secondary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5em;
            text-shadow: 2px 2px 0px var(--accent);
            margin-bottom: 15px;
        }

        #timer-display {
            display: inline-block;
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
            background: var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            border: 3px dashed #fff;
            margin-bottom: 20px;
        }

        .q-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 2px solid #eef2f5;
            transition: transform 0.3s ease;
        }

        .q-block:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .q-title {
            font-size: 1.25em;
            font-weight: 700;
            color: #1a535c;
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: flex-start;
            font-size: 1.05em;
        }

        .option:hover {
            background: #e0fbfc;
            border-color: var(--secondary);
            transform: scale(1.01);
        }

        .option input[type="radio"] {
            margin-top: 5px;
            margin-right: 15px;
            transform: scale(1.4);
            cursor: pointer;
            accent-color: var(--secondary);
        }

        .option.selected {
            background: #e0fbfc;
            border-color: var(--secondary);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(78, 205, 196, 0.2);
        }

        .option.correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: #155724;
            font-weight: bold;
        }

        .option.wrong {
            background: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: #721c24;
        }

        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #fff3cd;
            border-left: 6px solid #ffc107;
            border-radius: 10px;
            font-size: 1em;
            color: #856404;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }

        .explanation b {
            color: #d39e00;
            font-size: 1.1em;
            display: block;
            margin-bottom: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, var(--secondary), #29b6f6);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #028090, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #028090, 0 5px 10px rgba(0,0,0,0.2);
        }

        button:disabled {
            background: #adb5bd;
            box-shadow: 0 8px 0 #6c757d;
            cursor: not-allowed;
            transform: translateY(8px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header">
            <h1>🚀 Tư Duy Sử Dụng AI 🧠</h1>
            <div id="timer-display"></div>
            <p>Hãy chọn đáp án đúng nhất cho các câu hỏi dưới đây nhé!</p>
        </div>

        <div id="quiz-container"></div>

        <div class="footer">
            <button type="button" onclick="handleSubmit()">NỘP BÀI</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Câu 1: Thông điệp cốt lõi của ý “Đầu vào quyết định đầu ra” khi sử dụng AI là gì?",
                opts: [
                    "A. Chỉ cần dùng đúng công cụ AI nổi tiếng là sẽ có kết quả tốt",
                    "B. Chỉ cần hỏi ngắn gọn, AI sẽ tự hiểu đầy đủ",
                    "C. Chất lượng prompt ảnh hưởng trực tiếp đến chất lượng kết quả AI trả về",
                    "D. AI luôn cho ra câu trả lời chính xác dù người dùng hỏi thế nào"
                ],
                ans: 2,
                exp: "Đây là tư duy nền tảng nhất khi dùng AI. AI phản hồi dựa trên thông tin, yêu cầu, ngữ cảnh và cách diễn đạt mà người dùng cung cấp. Nếu prompt mơ hồ, thiếu mục tiêu, thiếu tiêu chí, kết quả thường chung chung hoặc sai trọng tâm. Với giáo viên, điều này đặc biệt quan trọng vì cùng một nội dung bài học, cách đặt prompt tốt sẽ giúp AI tạo ra giáo án, câu hỏi, rubric hay hoạt động phù hợp hơn rất nhiều."
            },
            {
                q: "Câu 2: Câu nào dưới đây thể hiện đúng nhất mối quan hệ giữa prompt tốt và kết quả tốt?",
                opts: [
                    "A. Prompt càng dài thì kết quả chắc chắn càng tốt",
                    "B. Prompt tốt là prompt làm rõ mục tiêu, đối tượng, yêu cầu và cách thực hiện",
                    "C. Prompt tốt là prompt sử dụng thật nhiều thuật ngữ chuyên môn",
                    "D. Prompt tốt là prompt khiến AI trả lời càng nhanh càng tốt"
                ],
                ans: 1,
                exp: "Một prompt tốt không phải là prompt dài nhất, mà là prompt rõ nhất. Nó cần cho AI biết: làm việc gì, cho ai, theo tiêu chuẩn nào, trình bày ra sao, cần tránh điều gì. Giáo viên khi dùng AI để hỗ trợ dạy học cần đặc biệt chú ý đến 4 điểm: mục tiêu bài học, đối tượng học sinh, mức độ phù hợp và định dạng đầu ra. Đó mới là yếu tố quyết định chất lượng."
            },
            {
                q: "Câu 3: Trong 3 mức sử dụng AI: Công cụ – Trợ lý – Đồng hành tư duy, mức độ nào cho thấy người dùng đã khai thác AI ở chiều sâu hơn?",
                opts: [
                    "A. Chỉ yêu cầu AI làm thay một việc đơn lẻ",
                    "B. Dùng AI để trang trí bài giảng cho đẹp",
                    "C. Dùng AI để cùng phân tích, phản biện, gợi mở và hoàn thiện tư duy của mình",
                    "D. Dùng AI để chép lại nội dung từ tài liệu cũ"
                ],
                ans: 2,
                exp: "Ở mức “công cụ”, AI chỉ là thứ để thực hiện một tác vụ. Ở mức “trợ lý”, AI hỗ trợ xử lý nhiều việc hơn, có tổ chức hơn. Nhưng ở mức “đồng hành tư duy”, AI không chỉ làm giúp mà còn cùng giáo viên suy nghĩ, đặt câu hỏi ngược lại, gợi ý phương án, phản biện lỗ hổng, đề xuất cải tiến. Đây là cấp độ sử dụng AI rất đáng hướng tới trong giáo dục vì nó giúp giáo viên nâng chất lượng chuyên môn chứ không chỉ tiết kiệm thời gian."
            },
            {
                q: "Câu 4: Ví dụ nào dưới đây thể hiện AI đang được dùng ở mức công cụ?",
                opts: [
                    "A. “Hãy phản biện giúp tôi 3 điểm yếu của kế hoạch dạy học này.”",
                    "B. “Hãy đóng vai cố vấn chuyên môn, cùng tôi chỉnh sửa kế hoạch bài dạy theo từng bước.”",
                    "C. “Hãy gợi ý cho tôi 5 tiêu đề hấp dẫn cho bài viết này.”",
                    "D. “Hãy phân tích vì sao học sinh lớp 5 dễ chán hoạt động này và đề xuất cách cải tiến.”"
                ],
                ans: 2,
                exp: "Mức “công cụ” là khi AI được dùng để làm một tác vụ cụ thể, ngắn hạn, tương đối đơn giản. Gợi ý 5 tiêu đề là một yêu cầu dạng tác vụ. Trong khi đó, các đáp án còn lại đã tiến gần hoặc đi thẳng vào mức “trợ lý” hay “đồng hành tư duy”, vì AI được huy động để phân tích, phản biện, cố vấn, đồng thiết kế."
            },
            {
                q: "Câu 5: Ví dụ nào dưới đây thể hiện AI đang được dùng ở mức trợ lý?",
                opts: [
                    "A. “Viết hộ tôi một đoạn mở bài ngắn.”",
                    "B. “Tạo cho tôi kế hoạch dạy 35 phút gồm mục tiêu, hoạt động, học liệu và cách đánh giá.”",
                    "C. “Cho tôi một hình minh họa đẹp.”",
                    "D. “Đọc suy nghĩ của tôi và tự làm mọi thứ.”"
                ],
                ans: 1,
                exp: "Ở mức “trợ lý”, AI không chỉ làm một phần việc rời rạc mà có thể hỗ trợ giáo viên xử lý một gói nhiệm vụ tương đối hoàn chỉnh. Ví dụ: lên kế hoạch bài dạy, chia hoạt động, gợi ý học liệu, thiết kế đánh giá. Đây là mức sử dụng rất thực tế với giáo viên, vì nó giúp giảm tải thao tác nhưng vẫn giữ vai trò chủ động quyết định của người dạy."
            },
            {
                q: "Câu 6: Đâu là ví dụ rõ nhất của việc dùng AI như đồng hành tư duy?",
                opts: [
                    "A. “Viết lại đoạn này cho hay hơn.”",
                    "B. “Tìm giúp tôi 10 câu hỏi trắc nghiệm.”",
                    "C. “Hãy đóng vai một đồng nghiệp phản biện, phân tích điểm mạnh – điểm yếu của kế hoạch dạy học này và hỏi ngược lại tôi 3 câu để tôi tự điều chỉnh.”",
                    "D. “Tạo cho tôi một bảng đẹp.”"
                ],
                ans: 2,
                exp: "“Đồng hành tư duy” là khi AI được dùng để đối thoại cùng tư duy của giáo viên, không chỉ cung cấp sản phẩm. AI ở vai trò này giúp phát hiện điểm mù, phản biện kế hoạch, gợi câu hỏi sâu hơn, mở rộng góc nhìn. Đây là kiểu dùng AI giúp giáo viên phát triển năng lực thiết kế dạy học, năng lực phản tư và năng lực chuyên môn bền vững hơn."
            },
            {
                q: "Câu 7: Trong cấu trúc một prompt tốt, phần Rules có vai trò chính là gì?",
                opts: [
                    "A. Yêu cầu AI làm càng nhanh càng tốt",
                    "B. Quy định nguyên tắc, giới hạn, tiêu chuẩn và những điều AI phải tuân thủ",
                    "C. Liệt kê càng nhiều từ khóa càng tốt",
                    "D. Thay thế hoàn toàn nội dung chuyên môn của người dùng"
                ],
                ans: 1,
                exp: "Rules là phần “luật chơi”. Nó giúp AI hiểu rõ cần tuân theo nguyên tắc nào, không được đi chệch sang đâu, phải giữ giọng văn ra sao, phù hợp với đối tượng nào, tránh những lỗi gì. Với giáo viên, phần Rules rất hữu ích khi cần yêu cầu AI: dùng ngôn ngữ dễ hiểu cho học sinh tiểu học, không dùng từ quá hàn lâm, không tạo nội dung lệch chuẩn giáo dục, không viết dài dòng. Có Rules rõ thì đầu ra ổn định và đúng định hướng hơn."
            },
            {
                q: "Câu 8: Trong prompt, phần Skills nên được hiểu đúng nhất là gì?",
                opts: [
                    "A. Những hiệu ứng trang trí giúp câu trả lời đẹp hơn",
                    "B. Những năng lực hoặc vai trò chuyên môn mà AI cần vận dụng để làm việc tốt hơn",
                    "C. Những câu nói tạo cảm hứng cho AI",
                    "D. Tên của các phần mềm khác nhau mà người dùng thích dùng"
                ],
                ans: 1,
                exp: "Skills là phần chỉ ra AI cần vận dụng những năng lực nào để xử lý nhiệm vụ. Ví dụ với giáo viên: “hãy vận dụng kỹ năng thiết kế hoạt động học tích cực, phân hóa học sinh, xây dựng câu hỏi đánh giá năng lực, viết ngôn ngữ sư phạm dễ hiểu”. Khi nói rõ Skills, người dùng đang “định vị” AI vào đúng vùng năng lực cần thiết, từ đó câu trả lời có chiều sâu và sát chuyên môn hơn."
            },
            {
                q: "Câu 9: Trong prompt, phần Workflow quan trọng vì lý do nào?",
                opts: [
                    "A. Giúp AI trả lời ngẫu hứng hơn",
                    "B. Giúp AI làm việc theo trình tự rõ ràng, tránh bỏ sót bước",
                    "C. Giúp prompt ngắn hơn",
                    "D. Giúp người dùng đỡ phải suy nghĩ mục tiêu"
                ],
                ans: 1,
                exp: "Workflow là quy trình thực hiện. Khi người dùng nêu rõ từng bước, AI sẽ làm việc có trật tự hơn: ví dụ phân tích yêu cầu → xác định mục tiêu → đề xuất cấu trúc → tạo bản nháp → rà lỗi → hoàn thiện đầu ra. Với giáo viên, Workflow đặc biệt quan trọng trong các việc như soạn giáo án, thiết kế đề kiểm tra, xây rubric, làm kế hoạch truyền thông phụ huynh. Không có Workflow, AI dễ nhảy cóc, thiếu bước hoặc trả lời rối."
            },
            {
                q: "Câu 10: Prompt nào dưới đây thể hiện tư duy tốt hơn trong việc thiết lập Rules – Skills – Workflow?",
                opts: [
                    "A. “Soạn bài cho tôi.”",
                    "B. “Hãy làm giúp tôi một giáo án thật hay.”",
                    "C. “Hãy đóng vai giáo viên tiểu học có kinh nghiệm, soạn kế hoạch dạy học 35 phút cho học sinh lớp 4. Rules: ngôn ngữ đơn giản, hoạt động rõ, phù hợp học sinh tiểu học. Skills: thiết kế hoạt động tích cực, đặt câu hỏi gợi mở, đánh giá cuối giờ. Workflow: 1. Xác định mục tiêu; 2. Thiết kế mở đầu; 3. Xây hoạt động chính; 4. Đề xuất cách kiểm tra cuối giờ; 5. Trình bày thành bảng.”",
                    "D. “Hãy tự hiểu ý tôi và làm sao cũng được.”"
                ],
                ans: 2,
                exp: "Đây là prompt tốt nhất vì đã thể hiện đầy đủ 3 thành tố quan trọng:<br>- Rules: quy định đầu ra phải đơn giản, rõ, phù hợp học sinh<br>- Skills: yêu cầu AI vận dụng năng lực đúng với nghề dạy học<br>- Workflow: hướng AI đi theo từng bước logic<br>Đây chính là cách nâng cấp tư duy dùng AI từ kiểu hỏi ngẫu hứng sang kiểu thiết kế prompt có chủ đích. Với giáo viên, đây là năng lực rất quan trọng nếu muốn AI thực sự trở thành trợ lý đắc lực và lâu dài hơn nữa là người đồng hành trong tư duy nghề nghiệp."
            },
            {
                q: "Câu 11: Giáo viên muốn nhờ AI tạo đề kiểm tra 15 phút môn Ngữ văn lớp 6. Prompt nào dưới đây là tốt nhất?",
                opts: [
                    "A. Hãy tạo cho tôi một đề kiểm tra Văn lớp 6.",
                    "B. Hãy làm một đề kiểm tra 15 phút môn Ngữ văn cho học sinh lớp 6, có câu hỏi hay và phù hợp.",
                    "C. Hãy đóng vai giáo viên Ngữ văn THCS, tạo đề kiểm tra 15 phút cho học sinh lớp 6 về nội dung truyện ngắn đã học. Yêu cầu gồm 5 câu trắc nghiệm và 1 câu tự luận ngắn, mức độ từ nhận biết đến thông hiểu, ngôn ngữ rõ ràng, trình bày sạch đẹp, kèm đáp án.",
                    "D. Hãy viết một đề kiểm tra thật sáng tạo, hấp dẫn, thú vị để học sinh thích làm bài hơn."

        let userAnswers = new Array(quizData.length).fill(null);

        function renderQuiz() {
            const container = document.getElementById("quiz-container");
            quizData.forEach((item, qIndex) => {
                const block = document.createElement('div');
                block.className = 'q-block';
                block.dataset.index = qIndex;

                const title = document.createElement('div');
                title.className = 'q-title';
                title.innerHTML = item.q;
                block.appendChild(title);

                const optsList = document.createElement('div');
                optsList.className = 'options-list';

                item.opts.forEach((optText, optIndex) => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'q_' + qIndex;
                    radio.value = optIndex;
                    radio.onchange = () => handleSelect(qIndex, optIndex, label);

                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(optText));
                    optsList.appendChild(label);
                });
                
                block.appendChild(optsList);

                const expDiv = document.createElement('div');
                expDiv.className = 'explanation';
                expDiv.innerHTML = '<b>💡 Giải thích chi tiết:</b>' + item.exp;
                block.appendChild(expDiv);

                container.appendChild(block);
            });
        }

        function handleSelect(qIndex, optIndex, labelElement) {
            userAnswers[qIndex] = optIndex;
            const block = document.querySelector(`.q-block[data-index="${qIndex}"]`);
            block.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            labelElement.classList.add('selected');
        }

        // Global functions required by system
        window.getUnanswered = function() {
            return userAnswers.filter(a => a === null).length;
        };

        window.getScore = function() {
            let correctCount = 0;
            for (let i = 0; i < quizData.length; i++) {
                if (userAnswers[i] === quizData[i].ans) {
                    correctCount++;
                }
            }
            return (correctCount / quizData.length) * 10;
        };

        window.showAnswers = function() {
            const inputs = document.querySelectorAll('input[type="radio"]');
            inputs.forEach(input => input.disabled = true);

            const btn = document.querySelector('button');
            if (btn) btn.disabled = true;

            quizData.forEach((item, i) => {
                const block = document.querySelector(`.q-block[data-index="${i}"]`);
                const correctAns = item.ans;
                const userAns = userAnswers[i];
                
                const options = block.querySelectorAll('.option');
                options.forEach((opt, idx) => {
                    opt.classList.remove('selected');
                    if (idx === correctAns) {
                        opt.classList.add('correct');
                    } else if (idx === userAns && userAns !== correctAns) {
                        opt.classList.add('wrong');
                    }
                });

                const expDiv = block.querySelector('.explanation');
                expDiv.style.display = 'block';
            });
        };

        window.handleSubmit = function() {
            // Function exists to fulfill button requirement. 
            // External system overrides this or handles click via event listeners.
        };

        document.addEventListener('DOMContentLoaded', renderQuiz);
    </script>

        function hideAIInputs() {
            const aiLop = document.getElementById('id_input_lop');
            const aiTen = document.getElementById('id_input_ten');
            if(aiLop) { if(aiLop.previousElementSibling?.tagName==='LABEL') aiLop.previousElementSibling.remove(); aiLop.remove(); }
            if(aiTen) { if(aiTen.previousElementSibling?.tagName==='LABEL') aiTen.previousElementSibling.remove(); aiTen.remove(); }
        }

        function initDynamicFilters() {
            const container = document.getElementById('xtd-dynamic-filters');
            const headers = sheetData.headers;
            const rows = sheetData.rows;
            let currentFilters = new Array(headers.length).fill('');

            function renderSelects() {
                container.innerHTML = '';
                headers.forEach((header, colIndex) => {
                    const select = document.createElement('select');
                    select.style.cssText = 'padding:8px; border-radius:4px; border:1px solid #ccc; min-width:150px;';
                    select.innerHTML = '<option value="">-- Chọn ' + (header || 'Cột ' + (colIndex+1)) + ' --</option>';

                    let validRows = rows.filter(row => {
                        for(let i = 0; i < colIndex; i++) {
                            if(currentFilters[i] && row[i] !== currentFilters[i]) return false;
                        }
                        return true;
                    });

                    [...new Set(validRows.map(row => row[colIndex]))].filter(v => v).forEach(val => {
                        const opt = document.createElement('option');
                        opt.value = val; opt.innerText = val;
                        if(currentFilters[colIndex] === val) opt.selected = true;
                        select.appendChild(opt);
                    });

                    select.onchange = (e) => {
                        currentFilters[colIndex] = e.target.value;
                        for(let i = colIndex + 1; i < headers.length; i++) currentFilters[i] = '';
                        renderSelects();
                        syncHiddenValues();
                    };
                    container.appendChild(select);
                });
            }

            function syncHiddenValues() {
                let realTen = document.getElementById('xtd_real_ten');
                if(!realTen) { realTen = document.createElement('input'); realTen.type='hidden'; realTen.id='xtd_real_ten'; document.body.appendChild(realTen); }
                realTen.value = currentFilters[headers.length - 1] !== '' ? currentFilters[headers.length - 1] : '';

                let realLop = document.getElementById('xtd_real_lop');
                if(!realLop) { realLop = document.createElement('input'); realLop.type='hidden'; realLop.id='xtd_real_lop'; document.body.appendChild(realLop); }
                realLop.value = headers.length > 1 ? currentFilters.slice(0, -1).filter(v => v).join(' - ') : lopMacDinh;
            }

            renderSelects();
            syncHiddenValues();
        }

        function initTimer() {
            const timerDisplay = document.getElementById('timer-display');
            if(timerDisplay) {
                timerInterval = setInterval(function() {
                    if(isSubmitted) return;
                    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    timerDisplay.innerText = m + ':' + (s < 10 ? '0' : '') + s;
                    if (timeLeft <= 0) { clearInterval(timerInterval); alert("Hết giờ! Tự động thu bài."); handleSubmit(true); }
                    timeLeft--;
                }, 1000);
            }
        }

        function showResultAndAnswers(diemHienThi, isOffline = false) {
            const oldBanner = document.getElementById('xtd-result-banner');
            if (oldBanner) oldBanner.remove();
            const banner = document.createElement('div');

            const bgColor = isOffline ? '#fff9c4' : '#e8f5e9';
            const textColor = isOffline ? '#f57f17' : '#2e7d32';
            const borderColor = isOffline ? '#fbc02d' : '#4caf50';
            const title = isOffline ? '[OFFLINE] KẾT QUẢ BÀI LÀM' : 'BẠN ĐÃ HOÀN THÀNH BÀI KIỂM TRA!';
            banner.innerHTML = '<div style="text-align:center;background:'+bgColor+';color:'+textColor+';padding:20px;border-radius:8px;margin:20px 10px;border:2px solid '+borderColor+';font-size:20px;font-weight:bold;">'+title+'<br><span style="font-size:28px;">Điểm: '+diemHienThi+'/10</span></div>';
            const topBar = document.getElementById('xtd-top-bar');
            if(topBar) topBar.parentNode.insertBefore(banner, topBar.nextSibling);
            else document.body.insertBefore(banner, document.body.firstChild);

            document.querySelectorAll('button').forEach(btn => {
                if(btn.getAttribute('onclick')?.includes('handleSubmit')) {
                    btn.innerHTML = isOffline ? 'ĐÃ NỘP BÀI (OFFLINE)' : 'ĐÃ NỘP BÀI';
                    btn.style.opacity = '0.6'; btn.style.cursor = 'not-allowed'; btn.disabled = true;
                }
            });

            if (typeof window.showAnswers === "function") window.showAnswers();
            else console.warn("AI không cung cấp hàm showAnswers().");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleSubmit(isAutoSubmit = false) {
            if(isSubmitted) return;
            let hoTen = document.getElementById('xtd_real_ten')?.value || "";
            let lop = document.getElementById('xtd_real_lop')?.value || lopMacDinh;

            if(!hoTen && !isAutoSubmit) { alert("Vui lòng chọn đầy đủ thông tin Họ tên ở thanh công cụ phía trên trước khi nộp!"); return; }
            if(!hoTen && isAutoSubmit) hoTen = "Chưa chọn tên (Hết giờ)";

            let unanswered = typeof window.getUnanswered === "function" ? window.getUnanswered() : 0;
            if (!isAutoSubmit && unanswered > 0) {
                if (!confirm('Bạn còn ' + unanswered + ' phần chưa làm. Có nộp không?')) return;
            }

            let diemTong = 0;
            if (typeof window.getScore === "function") diemTong = window.getScore();
            else { alert("LỖI: Giao diện AI sinh ra thiếu hàm getScore(). Không thể tính điểm!"); return; }

            isSubmitted = true;
            if(timerInterval) clearInterval(timerInterval);

            document.querySelectorAll('button').forEach(btn => {
                if(btn.getAttribute('onclick')?.includes('handleSubmit')) {
                    btn.innerHTML = '⏳ ĐANG CHẤM ĐIỂM...'; btn.style.opacity='0.7'; btn.style.cursor='wait'; btn.disabled=true;
                }
            });

            setTimeout(() => {
                const diemHienThi = Math.round(diemTong * 10) / 10;
                try {
                    EduTech.submitResult(
                        { tenBai: testName, hoTen: hoTen, lop: lop, diemTong: diemTong },
                        function() { alert("Nộp bài thành công! Điểm của bạn: " + diemHienThi + "/10"); showResultAndAnswers(diemHienThi, false); },
                        function() {
                            alert("Lỗi đường truyền! Điểm chưa được lưu.");
                            isSubmitted = false;
                            document.querySelectorAll('button').forEach(btn => {
                                if(btn.disabled && btn.getAttribute('onclick')?.includes('handleSubmit')) {
                                    btn.innerHTML='NỘP LẠI'; btn.style.opacity='1'; btn.style.cursor='pointer'; btn.disabled=false;
                                }
                            });
                        }
                    );
                } catch(e) {
                    alert("Không có mạng hoặc lỗi Core! Hiển thị điểm offline: " + diemHienThi + "/10");
                    isSubmitted = true;
                    showResultAndAnswers(diemHienThi, true);
                    console.error(e);
                }
            }, 800);
        }
    </script>
</body>
</html>
